<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Certificados - Codelco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        .header-app { background: #1a2a3a; color: white; padding: 1.5rem 0; text-align: center; margin-bottom: 1.5rem; }
        .card-nav { cursor: pointer; border-radius: 12px; background: white; padding: 15px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #dee2e6; transition: 0.2s; }
        .card-nav:active { transform: scale(0.98); }
        .hidden { display: none !important; }
        .table-container { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #dee2e6; width: 95%; max-width: 800px; margin: 0 auto; }
        .btn-back-float { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: #0d6efd; color: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000; }
        .breadcrumb-custom { background: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header class="header-app shadow">
    <h1 class="fw-bold m-0">Gestión de Certificados</h1>
    <small id="status-text text-warning">Cargando base de datos...</small>
</header>

<div class="container-fluid">
    <div id="navBar" class="breadcrumb-custom shadow-sm mx-auto hidden" style="max-width: 600px;">
        <span id="bc-seccion" class="text-primary fw-bold"></span>
        <span id="bc-separador" class="text-muted hidden"> > </span>
        <span id="bc-equipo" class="text-dark"></span>
    </div>

    <div id="vistaSecciones" class="row justify-content-center">
        <div class="text-center p-5"><div class="spinner-border text-primary"></div></div>
    </div>

    <div id="vistaEquipos" class="row justify-content-center hidden"></div>

    <div id="vistaCertificados" class="hidden">
        <div class="table-container shadow-sm">
            <table class="table table-hover align-middle mb-0 text-center">
                <thead class="table-dark">
                    <tr>
                        <th style="text-align: left; padding-left: 20px;">Componente</th>
                        <th>Doc.</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tablaSectores"></tbody>
            </table>
        </div>
    </div>
</div>

<button id="btnVolver" class="btn-back-float hidden" onclick="retroceder()">
    <i class="bi bi-arrow-left" style="font-size: 1.5rem;"></i>
</button>

<script>
    const DATOS_URL = 'CertificadosCH23.csv';
    let estructuraDatos = {}; // { "Seccion A": { "Equipo 1": [componentes], "Equipo 2": [] } }
    let pantallaActual = "secciones";
    let seccionSeleccionada = "";

    async function cargarDatos() {
        try {
            const response = await fetch(DATOS_URL + '?v=' + Date.now());
            const data = await response.text();
            procesarCSV(data);
        } catch (e) {
            document.getElementById('vistaSecciones').innerHTML = "<div class='alert alert-danger'>Error al cargar CertificadosCH23.csv</div>";
        }
    }

    function procesarCSV(texto) {
        const lineas = texto.split(/\r?\n/);
        estructuraDatos = {};
        
        for (let i = 1; i < lineas.length; i++) {
            if (!lineas[i].trim()) continue;
            const col = lineas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            if (col.length >= 4) {
                const equipo = col[0].replace(/"/g, '').trim();
                const seccion = col[1].replace(/"/g, '').trim();
                const componente = col[2].replace(/"/g, '').trim();
                const link = col[3] ? col[3].replace(/"/g, '').trim() : "";

                if (!estructuraDatos[seccion]) estructuraDatos[seccion] = {};
                if (!estructuraDatos[seccion][equipo]) estructuraDatos[seccion][equipo] = [];
                
                estructuraDatos[seccion][equipo].push({ nombre: componente, url: link });
            }
        }
        renderizarSecciones();
    }

    function renderizarSecciones() {
        pantallaActual = "secciones";
        const contenedor = document.getElementById('vistaSecciones');
        contenedor.innerHTML = "";
        document.getElementById('navBar').classList.add('hidden');
        document.getElementById('btnVolver').classList.add('hidden');
        document.getElementById('vistaEquipos').classList.add('hidden');
        document.getElementById('vistaCertificados').classList.add('hidden');
        contenedor.classList.remove('hidden');

        Object.keys(estructuraDatos).sort().forEach(sec => {
            contenedor.innerHTML += `
                <div class="col-12" style="max-width:600px">
                    <div class="card card-nav shadow-sm" onclick="mostrarEquipos('${sec}')">
                        <h5 class="m-0 fw-bold">${sec}</h5>
                        <i class="bi bi-chevron-right text-primary"></i>
                    </div>
                </div>`;
        });
    }

    function mostrarEquipos(sec) {
        pantallaActual = "equipos";
        seccionSeleccionada = sec;
        const contenedor = document.getElementById('vistaEquipos');
        contenedor.innerHTML = `<h3 class="text-center mb-4 fw-bold">${sec}</h3>`;
        
        document.getElementById('vistaSecciones').classList.add('hidden');
        document.getElementById('vistaCertificados').classList.add('hidden');
        contenedor.classList.remove('hidden');
        document.getElementById('btnVolver').classList.remove('hidden');
        
        // Breadcrumbs
        document.getElementById('navBar').classList.remove('hidden');
        document.getElementById('bc-seccion').innerText = sec;
        document.getElementById('bc-separador').classList.add('hidden');
        document.getElementById('bc-equipo').innerText = "";

        Object.keys(estructuraDatos[sec]).sort().forEach(eq => {
            contenedor.innerHTML += `
                <div class="col-12" style="max-width:600px">
                    <div class="card card-nav shadow-sm" onclick="mostrarTabla('${eq}')">
                        <h6 class="m-0">${eq}</h6>
                        <i class="bi bi-chevron-right text-muted"></i>
                    </div>
                </div>`;
        });
    }

    function mostrarTabla(eq) {
        pantallaActual = "tabla";
        document.getElementById('vistaEquipos').classList.add('hidden');
        document.getElementById('vistaCertificados').classList.remove('hidden');
        
        document.getElementById('bc-separador').classList.remove('hidden');
        document.getElementById('bc-equipo').innerText = eq;

        const tabla = document.getElementById('tablaSectores');
        tabla.innerHTML = "";

        estructuraDatos[seccionSeleccionada][eq].forEach(comp => {
            const tieneLink = comp.url.toLowerCase().startsWith('http');
            tabla.innerHTML += `
                <tr>
                    <td style="text-align: left; padding-left: 20px;">
                        <span class="fw-bold d-block">${comp.nombre}</span>
                        ${tieneLink ? `<a href="${comp.url}" target="_blank" style="font-size:0.8rem; font-weight:bold;">Abrir Canva <i class="bi bi-box-arrow-up-right"></i></a>` : ''}
                    </td>
                    <td><i class="bi ${tieneLink ? 'bi-file-earmark-check-fill text-primary' : 'bi-file-earmark-x text-muted'}" style="font-size: 1.5rem;"></i></td>
                    <td><span class="badge ${tieneLink ? 'bg-success' : 'bg-danger'}">${tieneLink ? 'Vigente' : 'No Vigente'}</span></td>
                </tr>`;
        });
    }

    function retroceder() {
        if (pantallaActual === "tabla") mostrarEquipos(seccionSeleccionada);
        else if (pantallaActual === "equipos") renderizarSecciones();
    }

    cargarDatos();
</script>
</body>
</html>
